<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Food Snap</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Food Snap</h1>
    <p class="sub">Take a food photo → get a rough calorie estimate.</p>
    <p class="sub"><strong>Version: v14</strong></p>

    <section class="card">
      <div class="row-between">
        <h2 style="margin:0;">Account</h2>
      </div>

      <div id="authBox">
        <div class="items-head">Email</div>
        <input id="authEmail" class="input" type="email" placeholder="you@example.com" />

        <div class="divider"></div>

        <div class="items-head">Password</div>
        <input id="authPassword" class="input" type="password" placeholder="At least 6 characters" />

        <div class="divider"></div>

        <div class="photo-actions">
          <button id="registerBtn" class="btn primary">Sign up</button>
          <button id="loginBtn" class="btn">Log in</button>
        </div>
      </div>

      <div id="currentUserBox" class="notes hidden"></div>

      <div id="logoutWrap" class="hidden" style="margin-top:12px;">
        <button id="logoutBtn" class="btn">Log out</button>
      </div>
    </section>

    <section class="card">
      <label class="btn">
        Take / Choose Photo
        <input id="photo" type="file" accept="image/*" capture="environment" />
      </label>

      <div id="preview" class="preview hidden">
        <img id="img" alt="Preview" />

        <div class="photo-actions">
          <button id="confirmPhoto" class="btn primary">Use this photo</button>
          <button id="retakePhoto" class="btn">Choose another</button>
        </div>
      </div>

      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <div class="row-between">
        <h2 style="margin:0;">Result</h2>
        <button id="editBtn" class="btn" disabled>Editing</button>
      </div>

      <div id="pretty" class="pretty hidden">
        <div class="totals-grid">
          <div class="total">
            <div class="total-label">Calories</div>
            <div id="totalCalories" class="total-value">—</div>
            <div class="total-unit">cal</div>
          </div>

          <div class="total">
            <div class="total-label">Protein</div>
            <div id="totalProtein" class="total-value">—</div>
            <div class="total-unit">g</div>
          </div>

          <div class="total">
            <div class="total-label">Fat</div>
            <div id="totalFat" class="total-value">—</div>
            <div class="total-unit">g</div>
          </div>

          <div class="total">
            <div class="total-label">Carbs</div>
            <div id="totalCarbs" class="total-value">—</div>
            <div class="total-unit">g</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="items-head">Meal time</div>
        <input id="consumedAtInput" class="input" type="datetime-local" />

        <div class="divider"></div>

        <div class="items-head">Meal name</div>
        <input id="mealName" class="input" placeholder="Auto-filled from time if left blank" />

        <div class="divider"></div>

        <div class="items-head">Ingredients</div>
        <input id="ingredientsInput" class="input" placeholder="Auto-filled from items, but editable" />

        <div class="divider"></div>

        <div class="items-head">Items</div>
        <div id="items" class="items"></div>

        <div class="divider"></div>

        <div class="items-head">Water (optional)</div>
        <input id="waterInput" class="input" type="number" min="0" step="0.1" value="0" placeholder="Water amount" />

        <div class="divider"></div>

        <div class="items-head">Notes</div>
        <div id="notes" class="notes"></div>

        <div class="divider"></div>

        <button id="saveMealBtn" class="btn primary">Save Meal</button>
      </div>

      <pre id="result" class="result hidden">(Hidden)</pre>
    </section>

    <section class="card">
      <div class="row-between">
        <h2 style="margin:0;">Recent meals</h2>
        <button id="loadMealsBtn" class="btn">Load meals</button>
      </div>

      <div id="recentMeals" class="items"></div>
    </section>

    <section class="card">
      <div class="row-between">
        <h2 style="margin:0;">Daily totals</h2>
      </div>

      <div class="items-head">Choose date</div>
      <input id="dailyDateInput" class="input" type="date" />

      <div class="divider"></div>

      <button id="loadDailyTotalsBtn" class="btn primary">Load daily totals</button>

      <div class="divider"></div>

      <div id="dailyTotalsBox" class="notes">
        No daily totals loaded yet.
      </div>
    </section>
  </main>

  <script src="/app.js?v=13"></script>
</body>
</html>
